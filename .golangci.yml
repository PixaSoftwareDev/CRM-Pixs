version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck  # includes gosimple, stylecheck (merged in golangci-lint v2)
    - errcheck
    - ineffassign
    - unused
    - gocritic
    - noctx
    - bodyclose
    - unparam
    - revive
  settings:
    goimports:
      local-prefixes: pixs
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
    revive:
      rules:
        - name: exported
          arguments:
            - "disableStutteringCheck"
            - "disableChecksOnVariables"
            - "disableChecksOnConstants"
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - unparam
        - gocritic

    - path: "internal/repository/sqlc/"
      linters:
        - gocritic
        - revive


  exclude-dirs:
    - vendor
    - internal/repository/sqlc
